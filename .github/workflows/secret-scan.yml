name: Secret scan

on:
  push:
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Scan the current repository state. Run a separate full-history scan
          # after legacy leaked credentials have been purged from Git history.
          fetch-depth: 1
      - uses: gitleaks/gitleaks-action@v2
